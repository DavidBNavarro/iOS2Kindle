<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web2Kindle — Send Articles to Your Kindle</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1c25; --border: #2e3040;
  --text: #e1e4ed; --text-muted: #8b8fa3; --accent: #3b82f6; --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
}
.container { max-width: 480px; width: 100%; text-align: center; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
h1 span { color: var(--accent); }
.tagline { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 24px 0; }
.step { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.step-num { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.step-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.step-desc { font-size: 11px; color: var(--text-muted); }
.btn { display: inline-block; background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; margin-top: 16px; }
.btn:hover { filter: brightness(1.15); }
</style>
</head>
<body>
<div class="container">
  <h1>Web<span>2</span>Kindle</h1>
  <p class="tagline">Forward newsletters to your Kindle. RSS coming soon.</p>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-title">Sign up</div><div class="step-desc">Enter your Kindle email</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-title">Get address</div><div class="step-desc">Receive your unique forwarding address</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-title">Forward</div><div class="step-desc">Forward any newsletter to your address</div></div>
  </div>
  <a href="/register" class="btn">Get Your Forwarding Address</a>
  <p style="margin-top: 16px; font-size: 13px;">Already have an account? <a href="/dashboard" style="color: var(--accent);">Go to dashboard</a></p>
</div>
</body>
</html>
